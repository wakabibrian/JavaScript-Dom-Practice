<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>TO DO List</title>
  </head>
  <body>
    <div class="todo-container">
      <h1 class="main-header-text">TODO LIST</h1>
      <div class="display-container">
        <div class="date-display">
          <h2 class="date-text">Today</h2>
          <p class="date-details">Monday, 11 May 2026</p>
        </div>
        <div class="completed-display">
          <h2 class="completed-text">Completed</h2>
          <p class="completed-details">Tasks: 0/0</p>
        </div>
      </div>

      <div class="add-task">
        <input
          type="text"
          name=""
          id="new-task"
          placeholder="Add a new task ..."
          autocomplete="off"
        />
        <button id="add-btn"><i class="fas fa-plus"></i>Add</button>
      </div>
      <div class="datetime-inputs">
        <input type="date" id="task-date" class="date-input" />
        <input type="time" id="task-time" class="time-input" />
      </div>
      <div class="task-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div class="task-list" id="task-list">
        <div class="empty-state">
          <i class="fas fa-tasks"></i>
          <h3>No tasks yet!</h3>
          <p>Add your first task to get started</p>
        </div>
      </div>

      <div class="task-priorities"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
