<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO 1. Link all the required font-families -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Diplomata&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lora:ital,wght@0,400..700;1,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />

    <title>Change Text Style</title>
  </head>
  <body>
    <main class="main">
      <!-- <label for="fruit-list">Fruits</label>
      <select id="fruit-list">
        <option value="orange">Orange</option>
        <option value="banana">Banana</option>
        <option value="mango">Mango</option>
      </select> -->

      <!-- TODO 1: Create dropdown menus for selecting font family, font size, and text color   -->
      <!-- Start Dropdown Menus Container -->
      <div class="dropdown-menus">
        <!-- <div class="font">
          <label for="font-family">Font:</label>
          <select id="font-family" class="font-family">
            <option value="lato">Lato</option>
            <option value="poppins">Poppins</option>
            <option value="roboto">Roboto</option>
            <option value="inter">Inter</option>
            <option value="montserrat">Montserrat</option>
          </select>
        </div> -->

        <div class="font-style">
          <label for="font-style">Font:</label>
          <select id="font-style">
            <option value="open-sans">Open Sans</option>
            <option value="roboto">Roboto</option>
            <option value="lora">Lora</option>
            <option value="google-sans">Google Sans</option>
            <option value="diplomata">Diplomata</option>
          </select>
        </div>

        <div class="size">
          <label for="font-size">Size:</label>
          <select id="font-size" class="font-size">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
            <option value="extra-large">Extra Large</option>
          </select>
        </div>

        <div class="color">
          <label for="text-color">Color:</label>
          <select id="text-color" class="text-color">
            <option value="black">Black</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="red">Red</option>
            <option value="purple">Purple</option>
          </select>
        </div>
      </div>
      <!-- End Dropdown Menus Container -->

      <!-- TODO 2: Create a text that updates dynamically based on the selected styles   -->
      <h1 class="main-text">Change my style using the menus above!</h1>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
